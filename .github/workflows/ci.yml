# ─────────────────────────────────────────────────────────────────────────────
# .github/workflows/ci.yml — FinSight Continuous Integration
#
# Runs automatically on every push and pull request to the Ayush branch.
#
# Pipeline steps:
#   1. Checkout code
#   2. Set up Python 3.11
#   3. Install dependencies
#   4. Run pytest unit tests
#   5. Upload test results as artifact
#
# Secrets required (set in GitHub → Settings → Secrets → Actions):
#   GROQ_API_KEY          — Groq API key (tests use mocks, but config needs it)
#   ALPHA_VANTAGE_API_KEY — Alpha Vantage key
#   NEWS_API_KEY          — NewsAPI key
# ─────────────────────────────────────────────────────────────────────────────

name: FinSight CI

on:
  push:
    branches: [ "Ayush", "main" ]
  pull_request:
    branches: [ "Ayush", "main" ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      # ── Step 1: Checkout ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Set up Python ──────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── Step 3: Install dependencies ───────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Step 4: Create .env for tests ─────────────────────────────────────
      # Tests use mocks so real keys aren't needed, but config.py reads them.
      # We use GitHub Secrets if available, otherwise dummy values for CI.
      - name: Create .env file
        run: |
          cat > .env << EOF
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY || 'dummy_key_for_ci' }}
          ALPHA_VANTAGE_API_KEY=${{ secrets.ALPHA_VANTAGE_API_KEY || 'dummy_key_for_ci' }}
          NEWS_API_KEY=${{ secrets.NEWS_API_KEY || 'dummy_key_for_ci' }}
          MLFLOW_TRACKING_URI=http://localhost:5001
          MLFLOW_EXPERIMENT_NAME=finsight-ci
          LLM_MODEL=llama-3.3-70b-versatile
          LOG_LEVEL=WARNING
          EOF

      # ── Step 5: Run tests ─────────────────────────────────────────────────
      - name: Run pytest
        run: |
          pytest tests/test_nodes.py \
            -v \
            --tb=short \
            --junit-xml=test-results.xml \
            -k "not test_returns_dict_fetch_price"
        env:
          PYTHONPATH: .

      # ── Step 6: Upload test results ───────────────────────────────────────
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()   # upload even if tests fail
        with:
          name: test-results
          path: test-results.xml
          retention-days: 7
