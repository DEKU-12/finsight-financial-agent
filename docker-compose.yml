# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — FinSight Local Development
#
# Starts two services:
#   mlflow  — MLflow tracking server  → http://localhost:5001
#   app     — Streamlit dashboard     → http://localhost:8501
#
# Usage:
#   docker compose up --build        # first time (builds the image)
#   docker compose up -d             # start in background
#   docker compose down              # stop everything
#   docker compose logs -f app       # follow app logs
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in your API keys
#   2. Docker Desktop must be running
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MLflow Tracking Server ──────────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    container_name: finsight-mlflow
    working_dir: /mlflow
    # Install mlflow then start the server with a SQLite backend
    # The DB and artifacts are stored in named Docker volumes (persisted between restarts)
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow server
                 --host 0.0.0.0
                 --port 5001
                 --backend-store-uri sqlite:////mlflow/mlflow.db
                 --default-artifact-root /mlflow/artifacts"
    ports:
      - "5001:5001"
    volumes:
      - mlflow_db:/mlflow          # persists mlflow.db and artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Streamlit App ───────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finsight-app
    ports:
      - "8501:8501"
    # Load all API keys from your .env file
    env_file:
      - .env
    environment:
      # Override MLflow URI to use the mlflow service name (Docker internal DNS)
      MLFLOW_TRACKING_URI: http://mlflow:5001
      MLFLOW_EXPERIMENT_NAME: finsight-runs
      # Reports go to a mounted volume so PDFs survive container restarts
      REPORTS_DIR: data/reports
      REFERENCE_DATA_DIR: data/reference
    volumes:
      # Mount data directory so generated PDFs and CSVs persist on the host
      - ./data:/app/data
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped

# ── Named volumes (persisted Docker storage) ───────────────────────────────────
volumes:
  mlflow_db:
    driver: local
